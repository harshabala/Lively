name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish assets to (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-and-release:
    # macos-14 ships Swift 5.10; Package.swift requires Swift 6.2 (Xcode 26+).
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3 (Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Verify Swift version
        run: swift --version

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip=Lively-${VERSION}-macOS.zip" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        run: ./package.sh

      - name: Create release zip
        run: |
          cd /private/tmp/LivelyOutput
          ditto -c -k --sequesterRsrc --keepParent Lively.app "${{ github.workspace }}/${{ steps.meta.outputs.zip }}"

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 "${{ steps.meta.outputs.zip }}" | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA}"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ZIP="${{ steps.meta.outputs.zip }}"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Lively ${TAG}" \
              --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for release notes."
          fi
          gh release upload "$TAG" "$ZIP" --repo "${{ github.repository }}" --clobber

      - name: Update Homebrew cask on master
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha256 }}
          ZIP: ${{ steps.meta.outputs.zip }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git fetch origin master
          git checkout master
          ruby -pi -e "
            gsub(/version \".*\"/, \"version \\\"${ENV['VERSION']}\\\"\")
            gsub(/sha256 \".*\"/, \"sha256 \\\"${ENV['SHA']}\\\"\")
            gsub(%r{url \".*\"}, \"url \\\"https://github.com/harshabala/Lively/releases/download/${ENV['TAG']}/${ENV['ZIP']}\\\"\")
          " Casks/lively.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/lively.rb
          git diff --staged --quiet || git commit -m "chore: update Homebrew cask for ${TAG}"
          git push origin master